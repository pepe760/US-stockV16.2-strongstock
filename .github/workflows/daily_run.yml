name: Run Quant Bot

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily
  workflow_dispatch:   # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # <--- Crucial line
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy tqdm requests lxml

      - name: Run Script
        run: python your_script_name.py # Ensure this generates index.html

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "🤖 自動生成每日 Quant Dashboard" || echo "No changes to commit"
          git push
